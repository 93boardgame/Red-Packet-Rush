<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>闆娘紅包場 - 雲端即時版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap");
      body {
        font-family: "Noto Sans TC", sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #fee2e2;
        border-radius: 10px;
      }
      .grab-btn-active {
        box-shadow:
          0 10px 25px -5px rgba(234, 179, 8, 0.5),
          0 8px 10px -6px rgba(234, 179, 8, 0.5);
      }
      @keyframes custom-bounce {
        0%,
        100% {
          transform: translateY(-5%) scale(1.05);
        }
        50% {
          transform: translateY(0) scale(1);
        }
      }
      .animate-soft-bounce {
        animation: custom-bounce 2s infinite ease-in-out;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-red-50 text-slate-800 flex flex-col items-center p-4"
  >
    <div
      id="loading-screen"
      class="fixed inset-0 bg-red-50 z-[100] flex flex-col items-center justify-center transition-opacity duration-500"
    >
      <div
        class="animate-spin border-4 border-red-600 border-t-transparent rounded-full w-12 h-12 mb-4"
      ></div>
      <p class="text-red-600 font-bold animate-pulse">雲端系統連線中...</p>
    </div>

    <header class="w-full max-w-md text-center py-8">
      <h1
        id="title-header"
        class="text-4xl font-black text-red-600 cursor-default select-none mb-2 flex items-center justify-center gap-2"
      >
        <span>🧧</span><span>闆娘搶紅包</span>
      </h1>
      <p class="text-red-400 text-xs tracking-widest uppercase font-bold">
        Real-time Cloud v4.5
      </p>
    </header>

    <div
      id="login-screen"
      class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 transform transition-all"

      <div class="mb-8 text-center">
        <div class="text-6xl mb-4">🌍</div>
        <h2 class="text-2xl font-bold text-gray-800">歡迎進入紅包場</h2>
        <p class="text-gray-400 text-sm mt-2">此房間資料與所有人即時同步</p>
      </div>
      <div class="space-y-4">
        <input

          type="text"

        <button

          class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-200 transition-all active:scale-95 text-lg"

          加入搶紅包行列
        </button>
      </div>
    </div>

    <main
      id="game-screen"
      class="hidden w-full max-w-md flex flex-col gap-6 animate-in fade-in duration-500"
    >
      <div
        class="relative bg-red-600 rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col items-center p-8 text-white gap-6"
      >
        <div class="text-center z-10">
          <div

            <span class="text-3xl">🧧</span>
          </div>
          <h2 id="display-name" class="text-2xl font-black mb-1">你好</h2>
          <p class="opacity-80 text-sm font-medium">

        <div id="timer-box" class="hidden w-full z-10">

        <button

          class="z-10 w-36 h-36 rounded-full border-[10px] border-yellow-500 bg-yellow-400 text-red-700 font-black text-5xl shadow-2xl flex items-center justify-center transition-all active:scale-90 animate-soft-bounce grab-btn-active disabled:animate-none disabled:opacity-50"
        >
          開
        </button>

        <p class="text-[10px] opacity-40 italic z-10 tracking-widest">
          ENCRYPTED REAL-TIME SYNC
        </p>

        <div

        <div

        <div

        <div

          <span

            >可領取數量</span
          >
          <p id="rem-count-2" class="text-2xl font-black text-red-600">--</p>
        </div>
      </div>

      <div
        class="bg-white rounded-3xl shadow-sm p-6 mb-10 border border-red-50"
      >
        <div
          class="flex justify-between items-center mb-6 border-b border-gray-50 pb-4"
        >
          <h3
            class="font-black text-slate-400 text-sm tracking-widest uppercase"
          >
            🕒 即時得獎榜
          </h3>
          <span
            id="record-count-badge"
            class="text-[10px] bg-red-100 text-red-600 px-3 py-1 rounded-full font-black"
            >已領走 0 個</span
          >
        </div>
        <div
          id="records-list"
          class="max-h-80 overflow-y-auto custom-scrollbar space-y-3"
        >
          <div class="text-center py-10 opacity-20 italic">尚無連線紀錄</div>
        </div>
      </div>
    </main>

    <div
      id="admin-modal"
      class="hidden fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center p-4 z-[200]"
    >
      <div
        class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden border border-white/20"
      >
        <div
          class="bg-slate-900 p-6 text-white flex justify-between items-center"
        >
          <div class="flex items-center gap-2">
            <span class="text-xl">⚙️</span>
            <span class="font-black tracking-tight">管理員控制台</span>
          </div>
          <button
            id="admin-close"
            class="text-gray-400 hover:text-white transition-colors text-2xl"
          >
            &times;
          </button>
        </div>

        <div id="admin-auth-view" class="p-10 space-y-6">
          <p class="text-sm text-gray-500 text-center font-medium">
            請輸入最高管理密碼
          </p>
          <input
            id="admin-pw"
            type="password"
            placeholder="••••••••"
            class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-slate-900 transition-all text-center tracking-widest"
          />
          <button
            id="admin-verify-btn"
            class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all"
          >
            驗證登入
          </button>
        </div>

        <div
          id="admin-panel-view"
          class="hidden p-6 space-y-5 max-h-[70vh] overflow-y-auto custom-scrollbar"
        >
          <div class="space-y-4">
            <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
              <label
                class="text-[10px] font-black text-blue-400 uppercase tracking-widest block mb-2"
                >基本獎池設定</label
              >
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="text-xs font-bold text-gray-500 block mb-1"
                    >總金額 ($)</label
                  >
                  <input
                    id="conf-total"
                    type="number"
                    class="w-full p-3 bg-white border border-blue-100 rounded-xl font-bold"
                  />
                </div>
                <div>
                  <label class="text-xs font-bold text-gray-500 block mb-1"
                    >總數量 (個)</label
                  >
                  <input
                    id="conf-count"
                    type="number"
                    class="w-full p-3 bg-white border border-blue-100 rounded-xl font-bold"
                  />
                </div>
              </div>
            </div>

            <div class="p-4 bg-purple-50 rounded-2xl border border-purple-100">
              <label
                class="text-[10px] font-black text-purple-400 uppercase tracking-widest block mb-2"
                >中獎率控制</label
              >
              <div class="flex items-center gap-4">
                <input
                  id="conf-prob"
                  type="range"
                  min="0"
                  max="100"
                  class="flex-1 accent-purple-600"
                />
                <span
                  id="prob-display"
                  class="font-black text-purple-600 w-12 text-right"
                  >100%</span
                >
              </div>
            </div>

            <div class="p-4 bg-orange-50 rounded-2xl border border-orange-100">
              <label
                class="text-[10px] font-black text-orange-400 uppercase tracking-widest block mb-2"
                >時間排程</label
              >
              <div class="space-y-3">
                <div>
                  <label class="text-xs font-bold text-gray-600 block mb-1"
                    >開始日期時間</label
                  >
                  <input
                    id="conf-starttime"
                    type="datetime-local"
                    class="w-full p-3 bg-white border border-orange-100 rounded-xl font-bold text-sm"
                  />
                </div>
                <div>
                  <label
                    class="text-xs font-bold text-gray-600 flex justify-between items-center mb-1"
                  >
                    <span>活動持續時間</span>
                    <span id="duration-label" class="text-orange-600 font-black"
                      >不限時</span
                    >
                  </label>
                  <input
                    id="conf-duration"
                    type="range"
                    min="0"
                    max="3600"
                    step="30"
                    class="w-full accent-orange-500"
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="pt-4 border-t border-gray-100 space-y-3">
            <button
              id="admin-save-btn"
              class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-red-100 transition-all active:scale-95"
            >
              🚀 立即重置並發布新活動

              ⚠️ 此動作會清空目前所有領取紀錄

    <footer
      class="mt-auto py-6 text-gray-300 text-[10px] tracking-[0.3em] uppercase font-bold"
    >
      Protected by Firebase Sentinel
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
      import {
        getFirestore,
        doc,
        setDoc,
        collection,
        onSnapshot,
        runTransaction,
        deleteDoc,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
      import {
        getAuth,
        signInAnonymously,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

      // --- Firebase Configuration ---
      const firebaseConfig = {
        apiKey: "AIzaSyANoY1GfwL6NK8Rkz_Z2ewIlIm-kfILrjc",
        authDomain: "mahjong-pro-v6-59f31.firebaseapp.com",
        projectId: "mahjong-pro-v6-59f31",
        storageBucket: "mahjong-pro-v6-59f31.firebasestorage.app",
        messagingSenderId: "921128919064",
        appId: "1:921128919064:web:5b9ed9899baddb041fa36d",
      };

      // --- Core Logic Class ---
      class MahjongRedPacket {
        constructor(config) {
          this.app = initializeApp(config);
          this.db = getFirestore(this.app);
          this.auth = getAuth(this.app);
          this.gameId = "cloud-red-envelope-html";

          this.state = {
            currentUser: null,
            userName: "",
            config: {
              totalAmount: 1000,
              count: 20,
              probability: 100,
              startTime: null,
              duration: 0,
            },
            pool: { remainingAmount: 0, remainingCount: 0, records: [] },
            isProcessing: false,
          };
        }

        async init() {
          onAuthStateChanged(this.auth, (user) => {
            if (user) {
              this.state.currentUser = user;
              this.startSyncing();
              this.dispatchEvent("auth-ready", user);
            }
          });

          try {
            await signInAnonymously(this.auth);
          } catch (e) {
            console.error("Auth Error", e);
          }
        }

        startSyncing() {
          const stateRef = doc(
            this.db,
            "artifacts",
            this.gameId,
            "public",
            "data",
            "game_state",
            "current",
          );
          onSnapshot(
            stateRef,
            (snap) => {
              if (snap.exists()) {
                const d = snap.data();
                this.state.config = d.config || this.state.config;
                this.state.pool.remainingAmount = d.remainingAmount;
                this.state.pool.remainingCount = d.remainingCount;
                this.dispatchEvent("state-update", this.state);
              } else {
                this.resetGame(this.state.config);
              }
            },
            (err) => this.dispatchEvent("error", err),
          );

          const recRef = collection(
            this.db,
            "artifacts",
            this.gameId,
            "public",
            "data",
            "records",
          );
          onSnapshot(recRef, (snap) => {
            const recs = [];
            snap.forEach((d) => recs.push(d.data()));
            this.state.pool.records = recs.sort(
              (a, b) => b.timestamp - a.timestamp,
            );
            this.dispatchEvent("records-update", this.state.pool.records);
          });
        }

        async grab(userName) {
          if (this.state.isProcessing || !userName)
            return { success: false, msg: "無效的操作" };
          const status = this.getTimeStatus();
          if (status.status === "not_started")
            return { success: false, msg: "活動還沒開始喔！" };
          if (status.status === "ended")
            return { success: false, msg: "活動已經結束了！" };
          if (this.state.pool.remainingCount <= 0)
            return { success: false, msg: "紅包已經發完囉！" };

          this.state.isProcessing = true;
          try {
            const nameKey = userName.trim().replace(/\s+/g, "_");
            const claimRef = doc(
              this.db,
              "artifacts",
              this.gameId,
              "public",
              "data",
              "claimed",
              nameKey,
            );
            let resultAmount = 0;

            await runTransaction(this.db, async (tx) => {
              const stateRef = doc(
                this.db,
                "artifacts",
                this.gameId,
                "public",
                "data",
                "game_state",
                "current",
              );
              const [stSnap, clSnap] = await Promise.all([
                tx.get(stateRef),
                tx.get(claimRef),
              ]);

              if (clSnap.exists()) throw "ALREADY_CLAIMED";
              const d = stSnap.data();
              const now = Date.now();

              if (d.config.startTime && now < d.config.startTime)
                throw "NOT_STARTED";
              if (
                d.config.startTime &&
                d.config.duration > 0 &&
                now > d.config.startTime + d.config.duration * 1000
              )
                throw "TIME_ENDED";
              if (d.remainingCount <= 0) throw "SOLD_OUT";
              if (Math.random() * 100 > d.config.probability) throw "NOT_LUCKY";

              let amount =
                d.remainingCount === 1
                  ? Math.round(d.remainingAmount * 100) / 100
                  : Math.round(
                      (Math.random() *
                        ((d.remainingAmount / d.remainingCount) * 2 - 0.01) +
                        0.01) *
                        100,
                    ) / 100;

              resultAmount = amount;
              tx.update(stateRef, {
                remainingAmount:
                  Math.round((d.remainingAmount - amount) * 100) / 100,
                remainingCount: d.remainingCount - 1,
              });
              tx.set(
                doc(
                  collection(
                    this.db,
                    "artifacts",
                    this.gameId,
                    "public",
                    "data",
                    "records",
                  ),
                ),
                {
                  name: userName,
                  amount,
                  timestamp: Date.now(),
                  timeStr: new Date().toLocaleTimeString(),
                },
              );
              tx.set(claimRef, {
                name: userName,
                amount,
                claimedAt: Date.now(),
              });
            });
            return { success: true, amount: resultAmount };
          } catch (e) {
            return { success: false, msg: this.getErrorMsg(e), code: e };
          } finally {
            this.state.isProcessing = false;
          }
        }

        async resetGame(newConfig) {
          const stateRef = doc(
            this.db,
            "artifacts",
            this.gameId,
            "public",
            "data",
            "game_state",
            "current",
          );
          await setDoc(stateRef, {
            config: newConfig,
            remainingAmount: newConfig.totalAmount,
            remainingCount: newConfig.count,
            updatedAt: Date.now(),
          });
          for (const colName of ["records", "claimed"]) {
            const snap = await getDocs(
              collection(
                this.db,
                "artifacts",
                this.gameId,
                "public",
                "data",
                colName,
              ),
            );
            for (const d of snap.docs) await deleteDoc(d.ref);
          }
        }

        getErrorMsg(code) {
          const msgs = {
            ALREADY_CLAIMED: "你已經搶過囉！每人限領一次。",
            SOLD_OUT: "手速太慢，紅包被搶光了！",
            NOT_LUCKY: "哎呀沒抓穩！再試一次？",
            NOT_STARTED: "活動還沒開始喔！",
            TIME_ENDED: "活動時間已結束！",
          };
          return msgs[code] || "系統忙碌中，請稍後再試";
        }

        getTimeStatus() {
          const now = Date.now();
          const { startTime, duration } = this.state.config;
          if (!startTime) return { status: "active" };
          if (now < startTime)
            return { status: "not_started", remaining: startTime - now };
          if (duration > 0) {
            const end = startTime + duration * 1000;
            return now >= end
              ? { status: "ended" }
              : { status: "active", remaining: end - now };
          }
          return { status: "active" };
        }

        dispatchEvent(name, detail) {
          window.dispatchEvent(new CustomEvent(`rp:${name}`, { detail }));
        }
      }

      // --- UI Controller ---
      const engine = new MahjongRedPacket(firebaseConfig);
      let userName = "";
      let adminClicks = 0,
        clickTimer = null;

      const el = (id) => document.getElementById(id);

      window.addEventListener("load", () => engine.init());

      window.addEventListener("rp:auth-ready", () => {
        el("loading-screen").classList.add("opacity-0");
        setTimeout(() => el("loading-screen").classList.add("hidden"), 500);
      });

      window.addEventListener("rp:state-update", (e) => updateGameUI(e.detail));
      window.addEventListener("rp:records-update", (e) =>
        updateRecordsUI(e.detail),
      );

      el("enter-btn").onclick = () => {
        const name = el("name-input").value.trim();
        if (!name) return alert("請輸入您的名字");
        userName = name;
        el("display-name").innerText = `你好, ${userName}`;
        el("login-screen").classList.add("hidden");
        el("game-screen").classList.remove("hidden");
      };

      el("grab-btn").onclick = async () => {
        if (engine.state.isProcessing) return;
        toggleGrabLoading(true);
        const res = await engine.grab(userName);
        toggleGrabLoading(false);

        if (res.success) {
          showModal(`恭喜 ${userName}！\n搶到了 $${res.amount}`, "🎉");
        } else {
          showModal(res.msg, res.code === "NOT_LUCKY" ? "😅" : "📢", res.code);
        }
      };

      function updateGameUI(state) {
        el("rem-amount").innerText = `$${state.pool.remainingAmount}`;
        el("rem-count").innerText = state.pool.remainingCount;
        el("rem-count-2").innerText = state.pool.remainingCount;
        updateTimerUI();
        updateGrabButtonState();
      }

      function updateRecordsUI(records) {
        const list = el("records-list");
        el("record-count-badge").innerText = `已領走 ${records.length} 個`;
        if (records.length === 0) {
          list.innerHTML = `<div class="text-center py-10 opacity-20 italic">尚無連線紀錄</div>`;
          return;
        }
        list.innerHTML = records
          .map(
            (r, i) => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100 hover:bg-white transition-colors group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-slate-200 text-slate-500 rounded-full flex items-center justify-center text-[10px] font-black">#${records.length - i}</div>
                        <div>
                            <div class="font-black text-slate-700">${r.name}</div>
                            <div class="text-[10px] text-gray-400 font-bold tracking-tight">${r.timeStr}</div>
                        </div>
                    </div>
                    <div class="text-red-500 font-black text-lg transform group-hover:scale-110 transition-transform">+$${r.amount}</div>
                </div>
            `,
          )
          .join("");
      }

      function updateTimerUI() {
        const status = engine.getTimeStatus();
        const box = el("timer-box");
        const display = el("timer-display");

        if (status.status === "active" && !status.remaining) {
          box.classList.add("hidden");
          return;
        }

        box.classList.remove("hidden");
        if (status.status === "not_started") {
          display.className =
            "w-full py-3 bg-yellow-500/20 border border-yellow-400/50 rounded-2xl";
          display.innerHTML = `<div class="text-yellow-200 text-[10px] font-black tracking-widest mb-1 uppercase">距離開始還有</div>
                                     <div class="text-3xl font-black tabular-nums">${fmtMs(status.remaining)}</div>`;
        } else if (status.status === "active") {
          const urgent = status.remaining < 10000;
          display.className = `w-full py-3 rounded-2xl border ${urgent ? "bg-red-900/40 border-red-400/50" : "bg-green-600/10 border-green-400/40"}`;
          display.innerHTML = `<div class="${urgent ? "text-red-300 animate-pulse" : "text-green-300"} text-[10px] font-black tracking-widest mb-1 uppercase">剩餘活動時間</div>
                                     <div class="text-3xl font-black tabular-nums ${urgent ? "text-red-200" : "text-white"}">${fmtMs(status.remaining)}</div>`;
        } else {
          display.className =
            "w-full py-3 bg-gray-800/40 border border-gray-600/50 rounded-2xl";
          display.innerHTML = `<div class="text-gray-400 font-black tracking-widest uppercase">活動已結束</div>`;
        }
      }

      function updateGrabButtonState() {
        const btn = el("grab-btn");
        const status = engine.getTimeStatus();
        const isGrabbedOut = engine.state.pool.remainingCount <= 0;

        if (isGrabbedOut) {
          setBtn(btn, false, "搶光");
          return;
        }
        if (status.status === "not_started") {
          setBtn(btn, false, "等待");
          return;
        }
        if (status.status === "ended") {
          setBtn(btn, false, "結束");
          return;
        }
        setBtn(btn, true, "開");
      }

      function setBtn(btn, active, text) {
        btn.innerHTML = text;
        btn.disabled = !active;
      }

      function toggleGrabLoading(loading) {
        const btn = el("grab-btn");
        if (loading) {
          btn.innerHTML = `<div class="animate-spin border-4 border-red-700 border-t-transparent rounded-full w-10 h-10"></div>`;
          btn.disabled = true;
        } else {
          updateGrabButtonState();
        }
      }

      function showModal(content, icon, code) {
        el("msg-content").innerText = content;
        el("msg-icon").innerText = icon;
        el("msg-modal").classList.remove("hidden");
        el("msg-close-btn").onclick = () => {
          el("msg-modal").classList.add("hidden");
          if (
            code === "ALREADY_CLAIMED" ||
            code === "SOLD_OUT" ||
            icon === "🎉"
          ) {
            el("game-screen").classList.add("hidden");
            el("login-screen").classList.remove("hidden");
            el("name-input").value = "";
          }
        };
      }

      function fmtMs(ms) {
        const s = Math.ceil(ms / 1000);
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
      }

      // --- Admin Controls ---
      el("title-header").onclick = () => {
        adminClicks++;
        clearTimeout(clickTimer);
        if (adminClicks >= 5) {
          el("admin-modal").classList.remove("hidden");
          adminClicks = 0;
        }
        clickTimer = setTimeout(() => (adminClicks = 0), 2000);
      };

      el("admin-close").onclick = () => {
        el("admin-modal").classList.add("hidden");
        el("admin-auth-view").classList.remove("hidden");
        el("admin-panel-view").classList.add("hidden");
        el("admin-pw").value = "";
      };

      el("admin-verify-btn").onclick = () => {
        if (el("admin-pw").value === "13491349") {
          el("admin-auth-view").classList.add("hidden");
          el("admin-panel-view").classList.remove("hidden");
          const conf = engine.state.config;
          el("conf-total").value = conf.totalAmount;
          el("conf-count").value = conf.count;
          el("conf-prob").value = conf.probability;
          el("conf-duration").value = conf.duration;
          if (conf.startTime) {
            const d = new Date(conf.startTime);
            el("conf-starttime").value = new Date(
              d.getTime() - d.getTimezoneOffset() * 60000,
            )
              .toISOString()
              .slice(0, 16);
          }
          updateAdminLabels();
        } else {
          alert("密碼錯誤");
        }
      };

      function updateAdminLabels() {
        const prob = el("conf-prob").value;
        const dur = el("conf-duration").value;
        el("prob-display").innerText = `${prob}%`;

        let durText = "不限時";
        if (dur > 0) {
          const m = Math.floor(dur / 60);
          const s = dur % 60;
          durText = s === 0 ? `${m} 分鐘` : `${m} 分 ${s} 秒`;
        }
        el("duration-label").innerText = durText;
      }

      el("conf-prob").oninput = updateAdminLabels;
      el("conf-duration").oninput = updateAdminLabels;

      el("admin-save-btn").onclick = async () => {
        const startVal = el("conf-starttime").value;
        const newConfig = {
          totalAmount: Number(el("conf-total").value),
          count: Number(el("conf-count").value),
          probability: Number(el("conf-prob").value),
          startTime: startVal ? new Date(startVal).getTime() : null,
          duration: Number(el("conf-duration").value),
        };

        if (confirm("確定要重置所有紀錄並發布新活動嗎？")) {
          el("admin-save-btn").disabled = true;
          el("admin-save-btn").innerText = "發布中...";
          await engine.resetGame(newConfig);
          el("admin-save-btn").disabled = false;
          el("admin-save-btn").innerText = "🚀 立即重置並發布新活動";
          el("admin-close").click();
        }
      };

      setInterval(() => {
        if (!el("game-screen").classList.contains("hidden")) {
          updateTimerUI();
          updateGrabButtonState();
        }
      }, 500);
    </script>
  </body>
</html>
